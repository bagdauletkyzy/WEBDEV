<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Spotify</title>
    <style>
        body{

            background-color: black;




        }
        .container{
            top:100px;
            display:flex ;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0px;
            left: 0px;
            display: flex;
            flex-direction: column;
            inline-size: 100%;
            min-block-size: 100%;
            overflow-wrap: break-word;
            overflow: auto;
            font-weight: 700;

        }
        .center{
            margin-bottom: 0px;
            position: absolute;



        }
        .logo{
            width:60px;
            margin-bottom: 5px;




        }
        .text{
            float:center;
            font-size:48px;
            color:white;
            left: 200px;
            top:50px;
            margin-bottom: 20px;



        }
        .email{
            background-color: black;
            padding: 15px;
            height: 20px;
            width: 270px;
            margin-bottom: 20px;
            color: white;
            border-color: darkgray;
            border-radius: 5px;
            box-sizing: border-box;


        }
        .account{
            color:darkgray;
        }

        .buttons{

            background-color: black;
            color:white;
            text-align: center;
            padding: 14px;
            font-family: var(--encore-body-font-stack);
            border-color: darkgray;
            padding: 15px;
            width: 250px;
            margin-bottom: 5px;
            border-radius: 30px;
            box-sizing: border-box;
            cursor: pointer;
            touch-action: manipulation;


        }
        p{
            color:white;
            font-size: 16px;
            font-family: var(--encore-body-font-stack);
            text-align: center;


        }
        .green-button{
            background-color: limegreen;
            ont-family: var(--encore-body-font-stack);
            padding: 16px;
            width: 220px;
            font-family: var(--encore-body-font-stack);
            border-radius: 30px;
            align-items: center;
            cursor: pointer;
            touch-action: manipulation;


        }

        .sign{
            color: white;
            text-align: center;
        }

    </style>
</head>
<body>
<section class="container">
    <div class="center">
        <img class="logo" src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_White.png" alt="logo">
        <h1 class="text">Welcome back</h1>

        <p>Email or username</p>
        <input type="text" class="email"><br>

        <button class="green-button" type="button">Continue</button>
        <p>or</p>
        <a><button class="buttons">Continue with Google</button></a><br>
        <a><button class="buttons">Continue with Facebook</button></a><br>
        <a><button class="buttons">Continue with Apple</button></a><br>

        <p class="account">Don't have an account?</p>
        <a class="sign">Sign up</a>

    </div>
    
</section>


<p>

</p>




</body>
</html>
